name: Build ES-DE-MAD AppImage

# This file MUST exist on BOTH branches of mmadalone/mad (keep them identical):
#   - main          (default branch)  -> makes the manual "Run workflow" dispatch
#                                         button/API available (workflow_dispatch only
#                                         surfaces from the default branch).
#   - deck-patches  (the ES-DE fork)  -> enables auto-build on push to the fork
#                                         (a push-triggered workflow is read from the
#                                         pushed branch, so it must live there too).
# The job ALWAYS checks out deck-patches, so it builds the patched ES-DE 3.4.1 fork
# no matter which branch the YAML was read from. main carries no ES-DE source.

on:
  workflow_dispatch:          # manual "Run workflow" button + REST/curl dispatch
  push:
    branches: [deck-patches]  # auto-build when the fork tree changes
                              # (this half only fires for the copy living on deck-patches)
    paths-ignore:             # docs-only changes don't need a ~30-min rebuild
      - '**.md'

# This is a PUBLISH job, not PR-CI: do NOT cancel an in-flight run, or a second
# trigger could abort the release upload and leave a missing/truncated asset.
concurrency:
  group: build-appimage
  cancel-in-progress: false

# softprops/action-gh-release writes a Release -> the job token needs contents: write.
permissions:
  contents: write

jobs:
  build:
    # Pin 22.04 (glibc 2.35). A binary linked here RUNS on SteamOS 3.7 (glibc 2.41)
    # because glibc is backward-, not forward-, compatible -- so build on the OLDER
    # glibc. This mirrors the proven local Ubuntu-22.04-distrobox recipe exactly.
    # NEVER use ubuntu-latest (now 24.04 / glibc 2.39: zero margin, and it drifts).
    runs-on: ubuntu-22.04

    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"   # no usable FUSE on GH runners -> extract-and-run
      DEBIAN_FRONTEND: noninteractive

    steps:
      # Build target = the FORK tree. fetch-depth: 0 pulls full history + all tags,
      # so base/v3.4.1 is present for the patch-commit report below.
      - name: Checkout deck-patches (full history + tags)
        uses: actions/checkout@v4
        with:
          ref: deck-patches
          fetch-depth: 0

      - name: Report build target
        run: |
          echo "On $(git rev-parse --abbrev-ref HEAD) @ $(git describe --tags --always 2>/dev/null || echo unknown)"
          echo "Patch commits on top of base/v3.4.1:"
          git log --oneline base/v3.4.1..HEAD 2>/dev/null | sed 's/^/    /' || echo "  (base/v3.4.1 tag not found)"

      # The exact dep list from ~/esde-build/ubuntu-build.sh (Jammy names), plus the
      # three libs linuxdeploy bundles by name (libOpenGL/libGLdispatch via libopengl0
      # + libglvnd0; libgio via libglib2.0-0) -- implicit -dev Depends today, named
      # explicitly so a future packaging change can't silently break the bundle step.
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential git cmake gettext wget file patchelf desktop-file-utils squashfs-tools libfuse2 ca-certificates \
            libharfbuzz-dev libicu-dev libsdl2-dev libavcodec-dev libavfilter-dev libavformat-dev libavutil-dev \
            libfreeimage-dev libfreetype6-dev libgit2-dev libcurl4-openssl-dev libpugixml-dev libasound2-dev \
            libbluetooth-dev libgl1-mesa-dev libpoppler-cpp-dev \
            libpipewire-0.3-dev libpulse-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdrm-dev libgbm-dev libegl1-mesa-dev libudev-dev \
            libopengl0 libglvnd0 libglib2.0-0

      # Call the UPSTREAM recipe VERBATIM so CI == the proven local build. It downloads
      # appimagetool + linuxdeploy, builds SDL 2.32.10 (aborts unless PipeWire is
      # detected), cmake -DAPPIMAGE_BUILD=on -DBUNDLED_CERTS=on -DSTEAM_DECK=on, make,
      # bundles the host libs + SDL, and emits ES-DE_x64_SteamDeck.AppImage in cwd.
      # The recipe's own failure gates use bare `exit` (status 0), so assert the
      # artifact here -- otherwise a recipe abort would go GREEN and fail cryptically
      # in a later step.
      - name: Build AppImage (upstream recipe, unmodified)
        run: |
          bash tools/create_AppImage_SteamDeck.sh
          test -f ES-DE_x64_SteamDeck.AppImage \
            || { echo "::error::recipe produced no AppImage (check cwd/.clang-format guard or SDL PipeWire detection above)"; exit 1; }

      # Rename (CI-only, not a recipe edit) to the asset name the Deck expects, and
      # publish a checksum companion for integrity verification on the Deck.
      - name: Rename + checksum
        run: |
          mv ES-DE_x64_SteamDeck.AppImage ES-DE-MAD.AppImage
          chmod +x ES-DE-MAD.AppImage
          sha256sum ES-DE-MAD.AppImage | tee ES-DE-MAD.AppImage.sha256
          ls -la ES-DE-MAD.AppImage
          file ES-DE-MAD.AppImage

      # Publish/overwrite assets on a single fixed ROLLING tag so the Deck always pulls
      # /releases/latest with no version logic. action-gh-release creates the tag/release
      # if absent and overwrites assets on re-run. Uses the auto GITHUB_TOKEN.
      - name: Publish AppImage as Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-steamdeck
          name: ES-DE-MAD (Steam Deck, latest)
          body: |
            Patched ES-DE 3.4.1 (MAD fork) AppImage, built on ubuntu-22.04 (glibc 2.35).
            Commit: ${{ github.sha }}
            Run: ${{ github.run_number }} (id ${{ github.run_id }})
          files: |
            ES-DE-MAD.AppImage
            ES-DE-MAD.AppImage.sha256
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
