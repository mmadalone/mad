# Controller routing policy for the ES-DE controller-router.
#
# Each [systems.<name>] entry lists per-port device-name priorities.
# Ports are 1-indexed; the router walks the priority list for each port and
# reserves the FIRST present device whose evdev/SDL2 name contains the listed
# substring (case-insensitive) OR whose controller FAMILY equals the token
# (matched by vendor:product id; see routing.family_of) — so a pad whose name
# lacks its family word, e.g. a DualShock 4 that enumerates as "Wireless
# Controller", is still picked by the "DualShock 4" token. Note "DualSense" and
# "DualShock 4" are SEPARATE families. If no match for a port, no reservation is
# written for that port and RetroArch auto-assigns it.
#
# Use `inherits = "<other system>"` to point a system at another system's
# ports (no need to repeat the list). Inheritance follows the FULL chain
# (A inherits B inherits C); the child's keys override the parent's, and cycles
# / undefined parents are detected and broken (warned on stderr).
#
# GLOBAL device pins (Phase 8) — usually written by MAD's "Players" page into
# controller-policy.local.toml, not here. A pin forces a specific PHYSICAL pad
# onto a player for EVERY game, overriding the per-system `ports` priority:
#   [pins]
#   1 = "uniq:054c:0ce6:a0:fa:9c:70:53:07"   # this DualSense (by BT MAC) = P1
#   2 = "uniq:054c:0ce6:50:ee:32:52:2b:c6"   # the other DualSense       = P2
# The value is a tagged identity key from lib.devices.pin_id():
#   uniq:<vid>:<pid>:<mac>        — port-agnostic ✓ (Bluetooth MAC / real serial)
#   port:<vid>:<pid>:<phys>:<i>   — port-only ⚠ (wired pad, no per-unit id)
#   vidpid:<vid>:<pid>            — model-only (can't tell two of a model apart)
# Pins are resolved at launch and honored by RetroArch, Cemu, PCSX2, xemu
# (class-level), rpcs3 and eden. A pin whose pad isn't connected is skipped.
# Sinden guns are excluded (PID-pinned by udev); supermodel can't pin in its ini.
# A `port:` pin can also target ONE half of the X-Arcade (the two halves differ
# only by USB interface, e.g. :1.0 vs :1.1). Node-addressable standalone wrappers
# (OpenBOR) resolve `controller-router.py pin-node <system> <player>` to that
# half's device node and set SDL_JOYSTICK_DEVICE — so the user can choose which
# half drives each player. (GUID/class emulators — xemu/PCSX2/eden/rpcs3 — bind by
# device class and CANNOT tell the two halves apart.)
#
# A custom collection (see [collections.*] near the bottom) can carry its own
# routing that OVERRIDES the launched system's policy whenever the ROM is a
# member — e.g. a Duck Hunt launch from NES routes by a lightgun collection, not
# as `nes`.
#
# Standalone emulators (NOT RetroArch): a system may set `backend = "cemu"`
# (Wii U) or `backend = "dolphin"` (Wii). Those are routed at ES-DE game-start
# (hook `05-controller-router-standalone.sh`) by `controller-router.py
# standalone`, which reads the matching `[backends.<name>]` table below. The
# same `ports` priority model applies (Pro preferred, DualSense fills empty
# ports); device classes are matched by name token here and by vid:pid in the
# backend. Everything is config — no behavior is hardcoded in Python.
#
# HARDWARE identity ([hardware]) — non-policy device facts:
#   [hardware]
#   xarcade_port = "1.2.4.1"   # USB port chain (from a device's phys) where the
#                              # X-Arcade lives. In Xbox mode it's 045e:02a1 —
#                              # IDENTICAL to a real Xbox 360 pad — so it's told
#                              # apart by USB PORT. Set/cleared by MAD's Preview
#                              # "Identify X-Arcade" button (writes local.toml).
#                              # Empty/unset → NO pad is the X-Arcade (every 045e is
#                              # treated as a regular Xbox pad; Identify to tag one).
#                              # Port-based ⚠ — re-cabling the stick → re-identify.

# ──────────────────────────────────────────────────────────────────────────
# RetroArch input PROFILES  (lib/ra_profiles.py)
# ──────────────────────────────────────────────────────────────────────────
# A profile is assigned to a controller FAMILY and stores SEMANTIC names, never
# numbers: at launch the pad the router actually seated turns "l3" into THAT
# pad's index, via its own RetroArch autoconfig (udev) or the SDL
# GameController table (sdl2). So one profile is correct for several pads at
# once, and none of it rots when a kernel renumbers buttons — which already
# happened here (6.16 moved the X-Arcade d-pad; see the memory
# xarcade-dpad-kernel-flip-2026-07-17). That is why Arcade says "left" and not
# the "13" it replaced.
#
# WHY THIS EXISTS: RetroArch polls hotkeys on ONE port, and the six raw numbers
# in the global retroarch.cfg were X-Arcade-shaped. A DualSense on P1 therefore
# got the modifier on L2 and no rewind at all (13/14 do not exist on it).
# Measured on this rig 2026-07-17 with both pads connected.
#
# Tokens: a RetroPad name (a, b, x, y, l, r, l2, r2, l3, r3, select, start,
# up/down/left/right) resolved through the seated pad's base map; "" = leave
# unbound; mbtn:N = a mouse button; btn:N / axis:+N = raw escapes.
#
# THE MODIFIER MUST RESOLVE. RetroArch only gates hotkeys when the enable-hotkey
# bind is SET, so a set whose modifier is unbound fires UNGATED (Start would open
# the menu mid-game). ra_profiles voids the whole set rather than ship that, which
# is safe but useless — so never point a family at a profile its pads cannot
# express. That is why 8BitDo has "Retro" and not "Gamepad": the FC30 has no
# sticks and no triggers, so l3/l2/r2 do not resolve on it at all.
#
# Verified against the LIVE fleet 2026-07-17 (X-Arcade, 2x Wii Remote Pro, the
# Deck's own pad), and against every other family's autoconfig: no profile
# resolves to a voided set on the pads it is assigned to.

[ra_profiles.Arcade.hotkeys]      # the X-Arcade cabinet: the current global cfg, re-expressed
modifier     = "select"           # = 6, unchanged
rewind       = "left"             # was the raw 13; now a hat token, kernel-proof
fast_forward = "right"            # was the raw 14
slowmotion   = "r"                # = 5, unchanged
menu         = "start"            # = 7, unchanged
quit         = "mbtn:3"           # the trackball's red button (needs the P1 mouse_index pin)

[ra_profiles.Gamepad.hotkeys]     # a full-size modern pad: sticks + analog triggers
modifier     = "l3"
rewind       = "l2"               # an analog trigger, so this lands on _axis, not _btn
fast_forward = "r2"
slowmotion   = "r"
menu         = "start"
quit         = ""                 # the router's own Select+Start-held-2s combo already quits

[ra_profiles.Retro.hotkeys]       # 8BitDo FC30/NES30: 6 buttons, NO sticks, NO triggers
modifier     = "start"
rewind       = "l"
fast_forward = "r"
slowmotion   = "a"                # resolves to 1 on the FC30 (it carries an A/B swap) and 0
menu         = "select"           # on the NES30 Pro: one profile, correct for both
# KNOWN OVERLAP, accepted: modifier+menu is Start+Select, the same chord as the router's quit
# combo. Tap for the menu, hold 2s to quit. The X-Arcade has this same overlap today.

[ra_profiles.Pro.hotkeys]         # 8BitDo Pro + Wii U Pro: they HAVE triggers, so use the gamepad
modifier     = "l3"               # layout like the Deck/Gamepad profiles (Miquel, 2026-07-17)
rewind       = "l2"               # L2 trigger  -- resolves per pad via its own autoconfig. Wii U Pro
fast_forward = "r2"               # R2 trigger     VERIFIED on-screen handheld (2026-07-17): L2/R2/R1
slowmotion   = "r"                # R1 bumper      fire rewind/ff/slow-mo. 8BitDo Pro not yet confirmed.
menu         = "select"           #

[ra_profiles.Deck.hotkeys]        # the Deck's own pad, handheld (sdl2)
modifier     = "l3"               # = 7            (left stick click)
rewind       = "l2"               # = axis +4      (L2, left trigger)
fast_forward = "r2"               # = axis +5      (R2, right trigger)
slowmotion   = "r"                # = 10           (R1, right bumper)
menu         = "select"           # = 4
quit         = "start"            # = 6
# The Deck is a gamepad, so it uses Miquel's gamepad hotkey layout (2026-07-17): rewind + fast-
# forward on the TRIGGERS (L2/R2), slow-motion on the RIGHT BUMPER (R1) -- identical to the Gamepad
# profile's rewind/ff/slowmotion. This DIVERGES from the legacy [handheld.retroarch] scheme (which
# had rewind/ff on the bumpers and slow-mo on R2); that was a stale layout, not Miquel's intent.
# Both rails still write handheld, but the per-game override WINS, so this layout is what applies;
# [handheld.retroarch] goes away with rail A (P2-delete).

[ra_profile_map]                  # family -> profile. Per-system overrides: [systems.<s>.ra_profile_map]
"X-Arcade"       = "Arcade"       # port-identified via [hardware].xarcade_port; a 045e with no
"Xbox"           = "Gamepad"      # matching port is a plain Xbox pad and gets Gamepad
"DualSense"      = "Gamepad"
"DualShock 4"    = "Gamepad"
"8BitDo"         = "Retro"        # NOT Gamepad — see the modifier note above
"8BitDo Pro"     = "Pro"
"Wii Remote Pro" = "Pro"
"Steam Deck"     = "Deck"

# ──────────────────────────────────────────────────────────────────────────
# arcade systems — X-Arcade Tankstick owns P1 + P2 (it has two joy ifaces),
# gamepads fill P3 + P4 if present
# ──────────────────────────────────────────────────────────────────────────

[systems.arcade]
category = "arcade"
ports = [
  ["X-Arcade", "8BitDo", "DualSense", "Xbox"],     # P1
  ["X-Arcade", "8BitDo", "DualSense", "Xbox"],     # P2
  ["DualSense", "8BitDo", "Xbox", "Steam Deck"],   # P3
  ["DualSense", "8BitDo", "Xbox", "Steam Deck"],   # P4
]

[systems.fba]
inherits = "arcade"

[systems.mame]
inherits = "arcade"

[systems.neogeo]
inherits = "arcade"

[systems.naomi]
inherits = "arcade"

[systems.naomi2]
inherits = "arcade"

[systems.pcsx2x6]
inherits = "arcade"
router_skip = true

[systems.ps2guncon]
# Retail PS2 GunCon2 lightgun co-op via the pcsx2x6 fork (-datapath ~/Applications/pcsx2x6-retail).
# A DISTINCT key from pcsx2x6 so the launch binder writes pads into the RETAIL ini, never the Namco
# arcade portable config. Same arcade inheritance + router_skip (own gun/keyboard input handling).
inherits = "arcade"
router_skip = true

[systems.lindbergh]
# Sega Lindbergh via lindbergh-loader (standalone). X-Arcade owns P1/P2 for
# coin/start/service; the loader reads input itself via lindbergh.ini evdev.
# Sinden lightgun routing + driver auto-start come from Pew-Pew-Pew!!! collection
# membership (require_sinden), not from here. Add router_skip if the router is
# found to interfere with the loader's raw evdev reads on-device.
inherits = "arcade"

[systems.atomiswave]
inherits = "arcade"

[systems.daphne]
# Daphne/Singe laserdisc games run NATIVELY via Hypseus (hypseus-pin.sh), NOT the
# inline/standalone router. hypseus-pin.sh reads `controller-router.py sdl-ignore
# daphne` (-> [backends.hypseus].pad_classes) for its SDL device whitelist, mirroring
# OpenBOR. router_skip keeps the standalone game-start hook hands-off (no backend
# dispatch noise — Hypseus configures its own SDL env).
inherits = "arcade"
backend = "hypseus"
router_skip = true

[systems.cannonball]
inherits = "arcade"

[systems.model3]
inherits = "arcade"
backend = "supermodel"   # routed via SDL filter in supermodel-native.sh

[systems.model2]
inherits = "arcade"      # ElSemi m2emu via Proton/umu (model-2-emulator.sh); no SDL filter needed

# ──────────────────────────────────────────────────────────────────────────
# NES family — 8BitDo's NES-style pads are the user's preferred feel here
# ──────────────────────────────────────────────────────────────────────────

[systems.nes]
category = "console"
warn_when_only_xarcade = true
ports = [
  ["8BitDo", "DualSense", "Xbox", "X-Arcade"],
  ["8BitDo", "DualSense", "Xbox", "X-Arcade"],
]

[systems.famicom]
inherits = "nes"

# ──────────────────────────────────────────────────────────────────────────
# Other console systems — DualSense first, 8BitDo fallback
# ──────────────────────────────────────────────────────────────────────────

[systems.snes]
category = "console"
warn_when_only_xarcade = true
ports = [
  ["DualSense", "8BitDo", "Xbox", "X-Arcade"],
  ["DualSense", "8BitDo", "Xbox", "X-Arcade"],
]

# Game Boy line (gba / gbc / gb) — handhelds, but played with a gamepad, so treat
# them as console for the X-Arcade warning (warn when ONLY the stick is connected).
# Ports (controller priority) come from the GUI-written local policy.
[systems.gba]
category = "console"

[systems.gbc]
category = "console"

[systems.gb]
category = "console"

[systems.sfc]
inherits = "snes"

[systems.snesh]
inherits = "snes"

[systems.snesmsu1]
inherits = "snes"

[systems.genesis]
inherits = "snes"

[systems.megadrive]
inherits = "snes"

[systems.mastersystem]
inherits = "snes"

[systems.sega32x]
inherits = "snes"

[systems.genh]
inherits = "snes"

[systems.n64]
inherits = "snes"

[systems.saturn]
inherits = "snes"

[systems.dreamcast]
inherits = "snes"

[systems.segacd]
inherits = "snes"

[systems.pcengine]
inherits = "snes"

[systems.pcenginecd]
inherits = "snes"

[systems.pcfx]
inherits = "snes"

[systems.supergrafx]
inherits = "snes"

[systems."3do"]
inherits = "snes"

[systems.amigacd32]
inherits = "snes"


# ──────────────────────────────────────────────────────────────────────────
# Wii (Dolphin, standalone) — real Wiimotes via a Mayflash DolphinBar.
# DolphinBar + >=1 Wiimote is required; if absent the router warns but lets
# the launch continue. Wiimote count picks "real" (1) vs "real2" (2).
# ──────────────────────────────────────────────────────────────────────────

[systems.wii]
category = "console"
backend = "dolphin"
require_dolphinbar = true

# ──────────────────────────────────────────────────────────────────────────
# Wii U (Cemu, standalone) — Wii U Pro Controllers preferred; DualSense fills
# any empty port. No external pad -> Steam Deck handheld profile (see backend).
# ──────────────────────────────────────────────────────────────────────────

# xbox runs STANDALONE xemu and is now Standalones-owned: MAD binds its pads →
# players at launch via mad-standalone-launch.py (lib/switch_bind + pads_cmds._EMUS
# ["xemu"], transient w/ on-exit restore), so the router skips it. backend kept
# harmless. Revert: drop router_skip + remove the wrapped xbox <system> from
# custom es_systems.
[systems.xbox]
category = "console"
backend = "xemu"
router_skip = true

[systems.switch]
category = "console"
backend = "eden"
# User hand-configures every Switch emulator (Eden/Yuzu EA/Suyu/Ryujinx); the
# standalone router must NOT touch Switch input. (Was a hardcoded exclusion in
# 05-controller-router-standalone.sh; now data-driven so the hook can route any
# backend-backed system unconditionally.)
router_skip = true

[systems.openbor]
# OpenBOR runs via Proton (openbor.sh), NOT through the inline/standalone router.
# openbor.sh reads `controller-router.py sdl-ignore openbor` (resolves to
# [backends.openbor].pad_classes) for its own SDL device whitelist. router_skip
# keeps the standalone game-start hook hands-off (no "unknown backend" noise).
category = "console"
backend = "openbor"
router_skip = true
# Arcade-style beat-'em-up → use the arcade warning (X-Arcade expected), not the
# console one, despite the console category (which sets its controller priority).
warn_when_no_xarcade = true
warn_when_only_xarcade = false

# ps3 runs STANDALONE RPCS3 (the default es_systems command) and is now
# Standalones-owned: MAD binds its pads → players at launch via
# mad-standalone-launch.py (see lib/switch_bind + pads_cmds._EMUS["rpcs3"], transient
# w/ on-exit restore), so the router skips it. `router_skip` makes the standalone
# game-start hook no-op for ps3; `backend` is kept harmless. To revert: drop
# router_skip + re-wrap the es_systems command with controller-router-wrap.sh.
[systems.ps3]
category = "console"
backend = "rpcs3"
router_skip = true

[systems.wiiu]
category = "console"
backend = "cemu"
# Hands-off: your hand-made Cemu controllerProfiles are the source of truth. MAD only
# SHOWS them (Preview) and lets you pick which named profile loads per slot (Backends
# page) — it never regenerates them, so the game-start router leaves Cemu input alone.
router_skip = true
# On the Steam Deck the DECK is the Wii U GamePad (Controller 1 = the screen) and
# is left untouched (see [backends.cemu].manage_ports). These lists are the
# EXTERNAL players in connection order — 1st external pad -> Cemu Controller 2,
# 2nd -> Controller 3, etc. (all Wii U Pro Controllers). Unfilled slots are
# disabled at launch.
ports = [
  ["Wii Remote Pro", "DualSense"],   # external player 1 -> Cemu Controller 2 (Pro)
  ["Wii Remote Pro", "DualSense"],   # external player 2 -> Cemu Controller 3 (Pro)
  ["Wii Remote Pro", "DualSense"],   # external player 3 -> Cemu Controller 4 (Pro)
  ["Wii Remote Pro", "DualSense"],   # external player 4 -> Cemu Controller 5 (Pro)
]

# ──────────────────────────────────────────────────────────────────────────
# PS2 (PCSX2, standalone) — PlayStation pads are the players. PS4 (DualShock 4)
# is treated like a DualSense HERE (standalone binds Sony pads by vid:pid class,
# so both PS4 and PS5 fill the slots; use a device pin to separate two of them).
# NOTE: for RetroArch `ports` priority they are SEPARATE families — "DualSense"
# and "DualShock 4" are independent rows you can order as distinct players (the
# router tells them apart by product id; see routing.family_of). 1 pad -> P1,
# 2 pads -> P1+P2. No PS pad -> Deck handheld. PCSX2 binds pads by SDL device
# INDEX, so the backend writes the pads' live SDL indices (see [backends.pcsx2]);
# no `ports` token list is used.
# ──────────────────────────────────────────────────────────────────────────

# ps2 runs STANDALONE PCSX2 (the default es_systems command) and is now
# Standalones-owned: MAD binds its pads → players at launch via
# mad-standalone-launch.py (see lib/switch_bind + pads_cmds._EMUS["pcsx2"]), so the
# router skips it. `router_skip` makes the 05-standalone hook no-op for ps2; the
# `backend`/`inherits` are kept harmless (only used if a future RA LRPS2 launch
# routes via the RA path). To revert: drop router_skip + re-wrap the es_systems
# command with controller-router-wrap.sh.
[systems.ps2]
inherits = "snes"
backend = "pcsx2"
router_skip = true

# PS1 (psx) is RetroArch here (Beetle-PSX core) — standard 2-player console routing; PS4 pads
# (vid 054c, evdev name "Wireless Controller") are picked up by the router's DualSense fallback
# (_fallback_token). GameCube is now standalone Dolphin (see [systems.gc] below), NOT RetroArch.
[systems.gc]
inherits = "snes"
# GameCube runs standalone Dolphin here (per-game alt-emulator). The dolphin_gc backend applies the
# chosen undocked gamepad profile at launch when handheld (no external pad); it does NOT do RetroArch
# routing (gc is standalone). See [backends.dolphin_gc] + lib/dolphin_gc_dock.py.
backend = "dolphin_gc"

[systems.psx]
inherits = "snes"

# ──────────────────────────────────────────────────────────────────────────
# MUGEN — fighting games on Ikemen GO. Two-player friendly; same console rules.
# ──────────────────────────────────────────────────────────────────────────

[systems.mugen]
inherits = "snes"
# Arcade-style fighters → use the arcade warning (X-Arcade expected), not the
# console one inherited from snes. (Keeps snes controller priority unchanged.)
warn_when_no_xarcade = true
warn_when_only_xarcade = false

# ──────────────────────────────────────────────────────────────────────────
# Handheld / single-player oddities — no opinion (no warn, fall through to RA defaults)
# ──────────────────────────────────────────────────────────────────────────

[systems.gameandwatch]
category = "handheld"
# no ports list = no router-managed reservations; RA auto-assigns

# ══════════════════════════════════════════════════════════════════════════
# Custom-collection rules. An ES-DE custom collection
# (~/ES-DE/collections/custom-<name>.cfg) can carry its own controller policy
# that OVERRIDES the launched system's policy whenever the ROM is a member —
# e.g. a Duck Hunt launch from NES routes by the lightgun collection, not by
# `nes`. Keyed by the collection's DISPLAY NAME; only ENABLED collections count
# (ES-DE's CollectionSystemsCustom). Membership is detected at launch by the
# router (lib/es_collections.py) since ES-DE passes the real system, not the
# collection. Set rules here or via the router GUI (which also wires the
# collection's member systems so routing fires). `require_sinden = true` marks a
# lightgun collection: it blocks on no gun (RetroArch path), pins the Sinden
# mouse_index, and makes the Dolphin/Wii hook use the Sinden Wii-Remote source.
# If a ROM is in several enabled collections, the first in CollectionSystemsCustom
# order wins.
# ══════════════════════════════════════════════════════════════════════════

# Example — a lightgun custom collection. Replace the name with YOUR ES-DE
# custom collection's display name. Usually written by MAD's GUI into
# controller-policy.local.toml, not here. `require_sinden = true` marks it a
# lightgun collection (blocks on no gun, pins the Sinden mouse_index, switches the
# Dolphin/Wii hook to the Sinden Wii-Remote source). The joypad `ports` are for
# menu / coin / start / pause; the Sinden gun drives aim via the mouse_index pin
# (computed at runtime, not from this list).
# [collections."My Lightgun Games"]
# category = "lightgun"
# require_sinden = true
# ports = [
#   ["8BitDo", "DualSense", "Xbox", "X-Arcade"],
#   ["8BitDo", "DualSense", "Xbox", "X-Arcade"],
# ]

# ══════════════════════════════════════════════════════════════════════════
# Standalone-emulator backends. Paths support a leading ~ (expanded). Device
# classes are keyed by "vid:pid" (lowercase hex). Nothing here is hardcoded in
# Python — tweak freely.
# ══════════════════════════════════════════════════════════════════════════

[backends.cemu]
# Cemu AppImage config tree (the one EmuDeck/ES-DE launches). The flatpak tree
# is ~/.var/app/info.cemu.Cemu/config/Cemu/controllerProfiles if you switch.
config_dir = "~/.config/Cemu/controllerProfiles"
# UI "Controller 1".."Controller 8" == controller0.xml .. controller7.xml.
# DECK-IS-GAMEPAD MODEL: on the Steam Deck the Deck itself is the Wii U GamePad
# (Controller 1 = the screen), hand-configured by the user and the source of
# truth. The router NEVER touches Controller 1 (slot 0). It manages the external
# Pro-controller player slots — Controller 2..5 (slots 1..4) — filling them in
# connection order and DISABLING (clearing) any that have no pad connected.
manage_ports = [1, 2, 3, 4]           # Controller 2,3,4,5 ; slot 0 (Deck GamePad) untouched
# Per device class -> the named Cemu profile to clone into the active port.
# The profile supplies the emulated <type>, <mappings>, SDL <uuid> GUID and
# <display_name>; the router only rewrites the uuid's "<index>_" prefix to the
# device's position within its own class (0 = first connected, 1 = second).
templates = { "057e:0330" = "WiiU Pro P1", "054c:0ce6" = "WiiU DualSense P1" }
# External pads are always Wii U Pro Controllers (the GamePad is the Deck on
# Controller 1, untouched). "" = no GamePad forcing. (Set to a GamePad template
# only if you wanted the FIRST managed slot to be a GamePad — not the Deck model.)
p1_gamepad_template = ""
# RESPECT. If ANY connected pad is one of these vid:pid classes, the router does
# NOT touch Cemu's input config at all. Empty by design here: Controller 1 (the
# Deck GamePad) is already structurally protected by manage_ports, and a real
# Wii U Pro pad (057e:0330) should be treated as a normal external player ->
# Controller 2/3 (Pro), so there's no whole-config escape hatch.
respect_user_config_classes = []
# Handheld: with manage_ports starting at slot 1, no external pad simply means
# Controller 1 (the Deck GamePad) stands alone and the managed slots are cleared.
# "" = don't write a handheld profile (the no-pad branch just disables C2..C5).
handheld_profile = ""
# Hold-to-quit shell command for this standalone emulator. Read by the quit-combo
# watcher (via lib/es_systems.quit_cmd). It is the ONLY place a flatpak appid can
# live (appids can't be derived from the launch command). Omit it on a standalone
# backend to fall back to a best-effort derived `pkill -f <emulator>`.
quit_cmd = "pkill -TERM -f Cemu; sleep 3; flatpak kill info.cemu.Cemu 2>/dev/null; pkill -KILL -f Cemu"

[backends.dolphin]
# Reuse the existing Wiimote-source switcher (single writer of WiimoteNew.ini).
wii_mode_tool = "~/Emulation/tools/launchers/dolphin-wii-mode.sh"
real2_min_wiimotes = 2                # >= this many connected Wiimotes -> "real2"
# Real Wii Remotes quit via the HID +/- combo (wiimote-quit-watcher.py, started in real mode). This
# quit_cmd adds the evdev pad-combo quit for GAMEPAD play -- Classic-Controller games with no DolphinBar,
# where there is no +/- remote to hold. Harmless for real/Sinden games (an idle extra watcher on the
# Deck pad; the +/- path is unchanged). Matches what GameCube (dolphin_gc) derives.
quit_cmd = "pkill -TERM -f dolphin"

[backends.dolphin_gc]
# GameCube (standalone Dolphin) dock/handheld. When NO external controller is present (only the
# Deck's built-in gamepad = handheld) the router loads the chosen undocked profile into GCPad1 for
# the session (transient, reverted after the game by hooks/game-end/dolphin-gc-restore.sh). The
# toggle + profile are set from MAD (Input -> GameCube -> Dock / handheld) and stored in
# controller-policy.local.toml as dock_autodetect (bool) + undocked_profile (a Profiles/GCPad name).
dock_autodetect = true

[backends.pcsx2]
# PCSX2 AppImage config (the one EmuDeck/ES-DE launches). Flatpak tree is
# ~/.var/app/net.pcsx2.PCSX2/config/PCSX2/inis/PCSX2.ini if you switch.
config_file = "~/.config/PCSX2/inis/PCSX2.ini"
manage_pads = 2                       # bind 2 pads by default (NO multitap). Most 1-player PS2 games get NO input with a port-1 multitap forced on, so 2 is the safe default. For 4-player co-op set "manage_pads = 4" in controller-policy.local.toml. Hardware max stays 8 (snapshot + Pad1..Pad8 null-out range = switch_bind._PLAYERS).
# PlayStation pad classes (vid:pid), priority order — PS4 treated like DualSense.
# PCSX2 binds by SDL index; the backend writes each pad's live SDL index.
pad_classes = ["054c:0ce6", "054c:09cc"]   # DualSense, DualShock 4
# No PlayStation pad connected -> bind Pad1 to this class so the Deck plays
# handheld. "" = leave PCSX2.ini untouched instead.
handheld_class = "28de:1205"          # Steam Deck Controller (SDL)
quit_cmd = "pkill -TERM -f pcsx2"

[backends.pcsx2x6]
# pcsx2x6 (Namco System 246/256 fork) runs -portable, so its config sits beside the
# AppImage (NOT ~/.config/PCSX2). The launch binder (switch_bind) writes Pad1..Pad8 here;
# the router path stays skipped ([systems.pcsx2x6] router_skip). config_file lets backups
# include it. handheld_class binds the Deck pad to Pad1 only when no external pad is
# present, so a DualSense (or any external pad) takes Player 1 and the Deck pad does not
# steal a slot.
config_file = "~/Applications/pcsx2x6/PCSX2x6/inis/PCSX2.ini"
manage_pads = 2                            # System 246/256 games are 1-2 players (P1/P2, no multitap)
pad_classes = ["054c:0ce6", "054c:09cc"]   # DualSense, DualShock 4
handheld_class = "28de:1205"               # Steam Deck Controller (SDL)

[backends.ps2guncon]
# Retail GunCon2 split: same pcsx2x6 AppImage, launched with -datapath ~/Applications/pcsx2x6-retail
# (data root = <datapath>/PCSX2x6 per the fork's SetDataDirectory). Mirrors [backends.pcsx2x6] but
# points config_file at the RETAIL ini, so the launch binder (switch_bind) writes Pad1/Pad2 there and
# never disturbs the Namco arcade config. The lightgun + keyboard D-pad are the real input; pad binding
# keeps the input-mapping page editable and lets a DualShock2 drive menus in the aim+move titles.
config_file = "~/Applications/pcsx2x6-retail/PCSX2x6/inis/PCSX2.ini"
manage_pads = 2                            # retail PS2 lightgun co-op is 1-2 players (no multitap)
pad_classes = ["054c:0ce6", "054c:09cc"]   # DualSense, DualShock 4
handheld_class = "28de:1205"               # Steam Deck Controller (SDL)

[backends.xemu]
# xemu (Original Xbox) flatpak TOML. Binds console ports to SDL GUIDs.
config_file = "~/.var/app/app.xemu.xemu/data/xemu/xemu/xemu.toml"
manage_ports = 4                      # Xbox supports up to 4 controllers
pad_classes = ["054c:0ce6", "054c:09cc"]   # DualSense, DualShock 4
handheld_class = "28de:1205"          # Steam Deck Controller (SDL)
quit_cmd = "pkill -TERM -f xemu; sleep 3; flatpak kill app.xemu.xemu 2>/dev/null; pkill -KILL -f xemu"

[backends.eden]
# Eden (Switch) qt-config.ini. Binds players by no-CRC SDL GUID + port.
config_file = "~/.config/eden/qt-config.ini"
template_profile = "~/.config/eden/input/Deck P1 Pro Controller.ini"
manage_players = 8                    # matches _PLAYERS["eden"]/_EMUS (switch is router_skip; router path unused, kept matched)
pad_classes = ["054c:0ce6", "054c:09cc"]
handheld_class = "28de:1205"
# Switch via Eden by default, but the user may pick Yuzu EA / Suyu / Ryujinx —
# quit whichever is running. Eden v0.0.3 IGNORES SIGTERM (hangs), so escalate to
# SIGKILL after a 2 s grace instead of waiting on the watcher's 6 s global
# backstop — ES-DE returns promptly. The grace lets Yuzu/Suyu/Ryujinx (which DO
# handle TERM) flush their state first.
quit_cmd = "pkill -TERM -f 'Eden|Yuzu|Suyu|Ryujinx|[Cc]itron'; sleep 2; pkill -KILL -f 'Eden|Yuzu|Suyu|Ryujinx|[Cc]itron'"
# Launch-time docked/handheld auto-detect (use_docked_mode 1/0). Controller-based (external pad ->
# docked, Deck-only -> handheld). Toggleable from MAD -> Switch -> Eden -> Dock detection; default
# on. Read by switch_bind._apply_dock.
dock_autodetect = true

[backends.citron]
# Citron (Switch, Yuzu fork) qt-config.ini. Same format as Eden -> bound via eden_cfg
# (no-CRC SDL GUID + port). switch is router_skip, so the launch WRAPPER
# (mad-switch-launch.py -> switch_bind) owns the bind; the router path is unused.
# No quit_cmd here: the switch system resolves its quit to [backends.eden].quit_cmd
# (the [systems.switch] backend), whose pattern now also matches Citron.
config_file = "~/.config/citron/qt-config.ini"
template_profile = "~/.config/citron/input/Deck P1.ini"
manage_players = 8                    # matches _PLAYERS["citron"]/_EMUS
pad_classes = ["054c:0ce6", "054c:09cc"]
handheld_class = "28de:1205"          # Deck built-in pad = handheld fallback (bound only when no external)
# Launch-time docked/handheld auto-detect (use_docked_mode 1/0). Controller-based (external pad ->
# docked, Deck-only -> handheld). Toggleable from MAD -> Switch -> Citron -> System -> Dock
# detection; default on. Read by switch_bind._apply_dock.
dock_autodetect = true

[backends.ryujinx]
# Ryujinx (Switch, Ryubing) uses a single JSON Config.json, bound at launch by switch_bind ->
# ryujinx_cfg (switch is router_skip, so the router path is unused; only the launch wrapper reads
# this table). Two keys matter:
#  * handheld_class = the Deck built-in pad, so the launch binder uses external pads when present
#    and falls back to the Deck only when nothing else is connected (matches Eden/Citron). This is
#    also the signal the controller-based dock auto-detect reads.
#  * dock_autodetect = launch-time docked/handheld auto-detect (docked_mode true/false). Toggleable
#    from MAD -> Switch -> Ryujinx -> System -> Dock detection; default on. Read by
#    switch_bind._apply_dock.
handheld_class = "28de:1205"          # Steam Deck Controller (SDL) = handheld fallback
dock_autodetect = true

[backends.openbor]
# OpenBOR runs via Proton (openbor.sh, Steam Input OFF so SDL sees raw pads).
# THE GAME NEVER SEES THESE PADS. mad-openbor-pads.py (the merger) grabs every
# player pad and emits one CANONICAL uinput twin per player (4d41:0002..0005);
# openbor.sh then whitelists only those twin pids. So most of what follows feeds
# the MERGER, not an SDL whitelist.
#
# ⚠ A BLOCKLIST *IS* SET, despite what this comment said until 2026-07-17.
# openbor.sh exports SDL_GAMECONTROLLER_IGNORE_DEVICES=0x28de/0x11ff,0x28de/0x1205
# on the merger path, because winebus EXEMPTS Steam's own virtual Deck pad from
# the whitelist: in Game Mode it walks straight past it, takes port 0 and shifts
# every player up a seat. Deleting that blocklist as "dead code" is exactly what
# broke docked seating on 2026-07-16 (restored in 1714eef), and no headless test
# can catch it because 28de:11ff only exists inside Game Mode. DO NOT REMOVE IT.
#
# Player ORDER (which pad is P1..P4, incl. the X-Arcade's :1.0/:1.1 halves) comes
# from the merger's build_plan, and the SEAT is pinned by the twin's pid. XInput
# caps OpenBOR at 4 pads. Details: deck-docs/openbor.md ("winebus" section).
#
# sdl_priority: INERT on the normal path — openbor.sh overwrites the whitelist
# with the twin pids, so this never reaches the game. Kept only for the
# merger-failure fallback (raw pads), and hidden from the MAD page for that
# reason. FALSE = expose every connected family, not just the top one.
sdl_priority = false
# Player families, in PRIORITY order (the merger fills P1..P4 with X-Arcade
# halves first, then these classes in order, by what is connected).
pad_classes = ["045e:02a1", "054c:0ce6", "054c:09cc", "2dc8:2810", "2dc8:3820"]
# handheld_class is LIVE (since 2026-07-17): with no player pad connected there is
# no merger, and openbor.sh whitelists THIS pad — the Deck's own. It used to be a
# hardcoded literal in openbor.sh while this knob did nothing.
handheld_class = "28de:11ff"
# Analog-stick -> d-pad gate. "radial" = vector 8-way: diagonals engage at the same
# push as cardinals, fixing the box gate's dead-diagonal band (beat-em-ups walk
# diagonally, so they had it too). Enabled 2026-07-19 after MUGEN validated it.
# stick_deadzone = the radial engage radius as a percent. Both tunable in
# Standalones -> OpenBOR -> Controllers (or per-rig in the .local overlay).
stick_gate = "radial"
stick_deadzone = 35
# OpenBOR has its own in-game quit menu, so it does NOT use the hold-to-quit
# combo. Explicit empty quit_cmd = opt out (no watcher starts for openbor).
quit_cmd = ""

[backends.mugen]
# MUGEN games run on Ikemen GO (native SDL2, launched by mugen.sh) -- NOT Proton.
# Same virtual-pad pipeline as OpenBOR: mad-openbor-pads.py --backend mugen grabs
# the player pads and emits canonical uinput twins (4d41:0002..0005); mugen.sh
# whitelists ONLY those twins so Ikemen seats them P1..P4 in OUR order. Ikemen
# caps at 4 players. Because Ikemen opens pads via SDL_GameControllerOpen, the
# twin (a novel 4d41 vid:pid) is made recognisable by a SDL_GAMECONTROLLERCONFIG
# mapping mugen.sh exports, so the twin's canonical shape binds through Ikemen's
# default gamepad config.
#
# Native SDL honours the twin whitelist for EVERY device (the winebus 28de:11ff
# exemption is Proton-only), so no separate blocklist is needed here.
#
# Player families in PRIORITY order (X-Arcade halves first, then these classes,
# by what is connected). Tune per-rig in controller-policy.local.toml. Only families
# the merger can translate (openbor_maps.CLASS_OF_VIDPID) belong here -- an untranslatable
# pad gets no twin and would be a silent dead seat. (8BitDo FC30 2dc8:2810 is NOT translatable
# yet, so it is intentionally omitted; add it to CLASS_OF_VIDPID first if support is wanted.)
pad_classes = ["045e:02a1", "054c:0ce6", "054c:09cc"]
# No player pad connected -> no merger; mugen.sh whitelists this pad (the Deck's
# own) so handheld solo play still works.
handheld_class = "28de:11ff"
# Analog-stick -> d-pad gate. "radial" treats the stick as a vector (one engage
# radius + 8-way angle snap) so DIAGONALS engage at the same push as cardinals --
# fighters need clean quarter-circles/DPs. The default per-axis "box" gate (what
# OpenBOR uses) makes diagonals need ~41% more deflection and feels buggy. mugen
# opts in here; OpenBOR intentionally stays on the box gate.
stick_gate = "radial"
# Radial engage radius as a PERCENT (35 -> 0.35); lower = more sensitive. Only used
# by the "radial" gate. Tunable per-rig in controller-policy.local.toml or the MAD
# Standalones -> M.U.G.E.N -> Input page.
stick_deadzone = 35

[backends.rpcs3]
# RPCS3 (PS3) global input yml. Binds players by SDL device NAME + 1-based index.
# Now Standalones-owned (router_skip in [systems.ps3]): the LAUNCH BINDER uses its
# own slot count (pads_cmds._EMUS["rpcs3"] / switch_bind._PLAYERS = 7); this
# manage_players is kept matched at 7 for the (now-skipped) router assign() path.
# 7 = up to 7 docked pads -> P1..P7 (PS3 max; handheld Deck fills P1 only when no external).
config_file = "~/.config/rpcs3/input_configs/global/Default.yml"
manage_players = 7
pad_classes = ["054c:0ce6", "054c:09cc"]
handheld_class = "28de:1205"
# RPCS3 --no-gui ignores SIGTERM AND its game process cmdline isn't reliably pkill-matchable in
# Game Mode: on-device, both `pkill -TERM` and `pkill -KILL -f '[r]pcs3'` failed (the game survived
# ~60s until a manual exit; the watcher already neutralises pkill self-match via `trap '' TERM`, so
# self-match was NOT the cause). Instead, gracefully stop RPCS3 via ITS OWN keyboard quit shortcut
# ([Shortcuts] game_window_stop in CurrentSettings.ini, default Alt+Esc), injected through a virtual
# (uinput) keyboard by mad-emit-quit.py -- the same uinput path the router uses to feed emulators
# virtual pads. The trailing `sleep; pkill -KILL` is only a last-resort backstop (a no-op when the
# graceful quit worked; mad-emit-quit.py also logs the live process list to diagnose the pkill miss).
quit_cmd = "python3 $HOME/Emulation/tools/launchers/mad-emit-quit.py rpcs3; sleep 6; pkill -KILL -f '[r]pcs3'"

[backends.supermodel]
# Supermodel (Model 3) can't pin pads in its ini — it reads SDL joystick order.
# The router computes an SDL_GAMECONTROLLER_IGNORE_DEVICES_EXCEPT whitelist (keep
# ONLY the chosen pads) that supermodel-native.sh exports, so they become
# JOY1/JOY2. Falls back to the Deck when no player pad is connected.
pad_classes = ["054c:0ce6", "054c:09cc"]
handheld_class = "28de:1205"
keep_extra = []                       # extra vid:pids to always keep visible
quit_cmd = "pkill -TERM -f supermodel"

[backends.hypseus]
# Hypseus (Daphne/Singe laserdisc) runs NATIVELY via hypseus-pin.sh, which exports
# the SDL device whitelist from `controller-router.py sdl-ignore daphne` (-> this
# backend) so ONLY the X-Arcade reaches Hypseus and the DualSense/Deck/guns are
# ignored. Laserdisc games are 1–2 player on a SINGLE device — the X-Arcade exposes
# BOTH players from one vid:pid — so sdl_priority = true keeps just the top present
# family (the X-Arcade, or the Deck when no X-Arcade is connected). Add a pad family
# here (also in the router GUI Backends page) to let a different controller drive
# Daphne. The X-Arcade presents as an Xbox 360 receiver (045e:02a1), same as OpenBOR's
# P1. Hypseus's own quit (ESC/Q) is unreachable on the X-Arcade, so quit_cmd kills
# it — giving Daphne/Singe the same hold Start+Select quit as the other standalone
# emulators. The `[h]` in the pattern stops pkill from matching its own shell, so the
# KILL fallback still fires if Hypseus ignores TERM.
sdl_priority = true
pad_classes = ["045e:02a1"]   # X-Arcade (Xbox 360 receiver class). Deck = handheld fallback.
handheld_class = "28de:11ff"
quit_cmd = "pkill -TERM -f '[h]ypseus.real'; sleep 1; pkill -KILL -f '[h]ypseus.real'"

# ══════════════════════════════════════════════════════════════════════════
# Hold-to-quit combo (standalone emulators). Buttons are evdev codes; the GUI's
# "Detect" feature rewrites them in controller-policy.local.toml. Default =
# Wii U +&- (BTN_SELECT 314 + BTN_START 315), verified live. Per-system override:
#   [quit_combo.switch]
#   buttons = [314, 315, 316]
# ══════════════════════════════════════════════════════════════════════════
[quit_combo]
buttons = [314, 315]
hold_sec = 1.0

# ══════════════════════════════════════════════════════════════════════════
# Backup / Restore (router-config-gui). Every [backends.*] config_file /
# config_dir above is snapshotted automatically; list here ONLY extra configs
# that have no router backend — the alternative Switch emulators the user
# hand-configures (Eden has a backend; Yuzu EA / Suyu / Ryujinx don't).
# ══════════════════════════════════════════════════════════════════════════
[backups]
extra_configs = { Yuzu = "~/.config/yuzu/qt-config.ini", Suyu = "~/.config/suyu/qt-config.ini", Ryujinx = "~/.config/Ryujinx/Config.json" }

# ══════════════════════════════════════════════════════════════════════════
# ON-THE-GO (handheld) auto-profiles
#
# When the Deck is played HANDHELD (internal panel, no external display) the
# on-the-go feature lowers each participating system to a lighter profile:
#   * a TDP watt cap — the real heat/battery lever. Applied at launch, restored on
#     exit, crash-safe; written via Valve's steamos-priv-write (no root setup).
#   * a lower internal render resolution (per emulator; see each system's `res`).
#   * the Deck's built-in pad as Player 1 (standalones already; RetroArch via an
#     sdl2 joypad-driver flip).
# DOCKED (external display) = NO change; the docked settings are restored exactly.
# Detection is the physical display. `detect="manual"` + `force=` overrides it, as
# do the MAD "On-the-go" page and the MAD_FORCE_CONTEXT env var (for testing).
#
# NOTE: keep the Steam per-game TDP slider (QAM) and any Decky/PowerTools TDP
# management at default/OFF for the ES-DE shortcut, or they will fight this cap.
# ══════════════════════════════════════════════════════════════════════════
[handheld]
enabled = true            # master switch for the whole feature
detect = "display"        # "display" (auto, physical panel) | "manual"
force = ""                # "" | "handheld" | "docked"  (manual override / testing)
default_watt_cap = 12     # watts; applied to a participating system with no watt_cap
                          # of its own. 15 W is stock; this is a mild, safe cut —
                          # tune per system on-device (only you can see frame rates).

# Handheld RetroArch HOTKEYS (applies to every RetroArch system when undocked; your docked
# X-Arcade hotkeys are restored on exit). WHY combos: RetroArch can't read Steam Input's
# SYNTHETIC paddle keys without putting input_driver on sdl2/x11, and that kills the sdl2 joypad
# driver -- and the Deck's virtual pad maps fully + stably ONLY on sdl2 (its udev button indices
# shift between launches). So handheld we keep the pad on sdl2 and reach the hotkeys with gamepad
# COMBOS: hold the modifier button + a button. The hotkey buttons keep their normal gameplay
# function when the modifier isn't held (input_enable_hotkey gates them). Indices are the sdl2
# "Steam Virtual Gamepad" profile's: L3=7, L1=9, R1=10, Select=4, R2 trigger axis=+5.
[handheld.retroarch]
enabled          = true       # master on/off for the handheld RA hotkey combos
joypad_driver    = "sdl2"     # input_joypad_driver handheld (full, stable pad). Docked = udev.
modifier_btn     = 7          # L3 (left stick click) = the hotkey modifier (hold it)
rewind_btn       = 9          # + L1 (left bumper)   -> rewind (hold)
fast_forward_btn = 10         # + R1 (right bumper)  -> fast-forward (hold)
menu_btn         = 4          # + Select            -> quick menu
slowmotion_axis  = "+5"       # + R2 (right trigger) -> slow-motion (toggle)

# Per-system participation + targets. `enabled=false` (or removing the block) opts a
# system out. `watt_cap` overrides default_watt_cap. `res` is the handheld internal
# resolution target used by later phases: "native" (1x) | "2x" | "inherit" (leave
# untouched). Give a heavy title more headroom with a per-system watt_cap.
[systems.switch.handheld]     # BOTW etc. (Eden/Citron/Ryujinx)
enabled = true
res = "native"                # 720p base (use_docked_mode = false)
[systems.ps3.handheld]        # RPCS3 — most CPU/GPU hungry; give it more headroom
enabled = true
watt_cap = 13
res = "native"                # Resolution Scale 100
[systems.ps2.handheld]        # PCSX2
enabled = true
res = "native"                # upscale_multiplier 1x
[systems.gc.handheld]         # GameCube (standalone Dolphin)
enabled = true
res = "native"                # InternalResolution 1x
[systems.wii.handheld]        # Wii (Dolphin)
enabled = true
res = "native"
[systems.wiiu.handheld]       # Cemu — resolution is curated (graphic packs), not auto
enabled = true
res = "inherit"
[systems.psx.handheld]        # Beetle PSX HW
enabled = true
res = "native"
[systems.n64.handheld]        # Mupen64Plus-Next
enabled = true
res = "native"
[systems.saturn.handheld]     # Kronos (HW upscale)
enabled = true
res = "native"
[systems.dreamcast.handheld]  # Flycast
enabled = true
res = "native"
[systems.naomi.handheld]      # Flycast (NAOMI)
enabled = true
res = "native"
[systems.atomiswave.handheld] # Flycast (Atomiswave)
enabled = true
res = "native"
