# MAD install choices — written by install.sh's picker (and the MAD "Sidebar" page).
# Plain shell key=value: install.sh + deck-post-update.sh `.` source it, and
# lib/install_conf.py reads/writes it from the backend. Values: 1/0 (or on/off/
# yes/no/true/false; 'auto' also counts as "yes" for want()).
#
# THIS IS THE SHIPPED EXAMPLE. The real `install.conf` is gitignored and written by
# the installer — change it via the picker (`install.sh --reconfigure`) or the MAD
# panel, not by editing this file.
#
# INVARIANT: if install.conf is ABSENT, install.sh + deck-post-update.sh do EVERYTHING
# (the legacy "do everything"). For deck-post-update.sh on an existing setup that is a
# byte-identical restore; install.sh additionally has steps legacy didn't (Sinden/Samba/
# hooks), which therefore run by default. This file only ever NARROWS what runs.

# Install mode — set by detection (1 = standalone, no EmuDeck).
MAD_STANDALONE=0

# ── Optional components the picker toggles ───────────────────────────────────
INSTALL_THEME=1     # pixel-es-de theme + launch-screen hooks (the theme also carries MAD's panel icons)
INSTALL_SINDEN=1    # Sinden lightgun: driver + mono/SDL + udev rule + the sinden/Wii game hooks
INSTALL_SAMBA=0     # Samba file sharing (network share of ROMs / media)

# ── Advanced (not shown in the picker) ───────────────────────────────────────
# Suspend mode. 'auto' = detect the Deck model and do the right thing (OLED → s2idle,
# LCD → deep/S3 — the LCD-only workaround). 'off' = don't touch suspend. 'on' = force
# deep/S3 regardless of model (rarely needed).
INSTALL_SUSPEND=auto

# ── MAD "Sidebar" page overrides (written by the panel) ──────────────────────
# By default the control-panel sidebar AUTO-HIDES hardware rows you can't use yet
# (Lightgun without a Sinden driver, X-Arcade without an identified cabinet, Bezel
# Project without RetroArch). Force a row on/off regardless with these keys (value 1):
#   FORCE_SHOW_<SECTION> / FORCE_HIDE_<SECTION>   sections: lightgun, x-arcade, bezelproject
# e.g.
#   FORCE_SHOW_XARCADE=1
#   FORCE_HIDE_BEZELPROJECT=1
