# Sinden config — edited by MAD (the control panel) and sourced by
# sinden-start.sh / sinden-stop.sh. (Plain shell key=value so the scripts can `.` it.)
#
# TV LED border strip: on driver START, fire the Home-Assistant webhook _START;
# on STOP, fire _STOP. Set ENABLED=0 to leave your LED strip completely alone.
# The base URL + webhook IDs are yours — edit them here freely (MAD only toggles ENABLED).
SINDEN_LED_ENABLED=1
SINDEN_LED_HA_BASE="http://homeassistant:8123"
SINDEN_LED_WEBHOOK_START="sinden_game_start"
SINDEN_LED_WEBHOOK_STOP="sinden_game_exit"
