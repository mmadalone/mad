# Sinden config, sourced by sinden-start.sh / sinden-stop.sh and toggled by MAD.
# Plain shell key=value (the scripts `.` it).
#
# THIS IS THE SHIPPED EXAMPLE. install.sh copies it to `sinden.conf` on a fresh
# install. Your real `sinden.conf` is gitignored, so your own HA details stay
# out of the public repo; edit `sinden.conf`, not this file.
#
# ── Optional: TV LED border strip via Home Assistant ─────────────────────────
# When the Sinden driver STARTS (a lightgun game launches), MAD fires the HA
# webhook _START to switch on a TV LED strip; on STOP it fires _STOP. Leave
# ENABLED=0 to never touch your lights (the default).
#
# HOW THE "AUTH" WORKS: there is NO token. A Home Assistant webhook is triggered
# by POSTing to  <base>/api/webhook/<webhook_id>  with no header: the webhook_id
# IS the secret (like an unguessable share link). So, to stay safe:
#   • Use the RANDOM webhook IDs Home Assistant generates (not guessable names),
#     and keep them secret (don't commit them anywhere public).
#   • In HA, keep the webhook trigger's `local_only: true` ON (HA's default for
#     UI-created webhooks) so ONLY devices on your LAN can fire it.
#   • Don't expose your Home Assistant to the internet for this.
# Make two HA automations (webhook trigger): one turns the LED strip on, one off,
# then paste their webhook IDs below.
SINDEN_LED_ENABLED=0
SINDEN_LED_HA_BASE="http://homeassistant.local:8123"
SINDEN_LED_WEBHOOK_START="REPLACE_WITH_YOUR_START_WEBHOOK_ID"
SINDEN_LED_WEBHOOK_STOP="REPLACE_WITH_YOUR_STOP_WEBHOOK_ID"
